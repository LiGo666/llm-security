<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1a1a1a;
    }
 
    .card {
      text-align: center;
      padding: 3rem 4rem;
    }
 
    h1 {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
 
    p {
      font-size: 1.1rem;
      color: #777;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World.</h1>
    <p>Nice and simple.</p>
  </div>
</body>
</html>
